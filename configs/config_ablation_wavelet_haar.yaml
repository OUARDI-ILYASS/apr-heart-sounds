# A7 - Haar mother wavelet instead of db4.
# Purpose: design-choice justification for the PWP branch. Haar has a single
# vanishing moment and very poor frequency localisation, so it should be a
# weaker basis for separating murmur texture from S1/S2 transients.
experiment:
  name: "A7_wavelet_haar"
  description: "Ablation A7: Haar wavelet instead of db4"
features:
  pwp:
    wavelet: "haar"
