# =============================================================================
# MASTER CONFIGURATION - Single source of truth for the entire pipeline.
#
# Every script reads this file. Nothing is hardcoded in the scripts. If you
# want to change an experiment, you change this file (or pass --override).
#
# PROFESSOR Q: "Why a config file instead of arguments in each script?"
# A: Reproducibility. The config is hashed and the hash is stored in every
#    phase summary, so any result can be traced back to the exact parameter
#    set that produced it. Ablations are then just override files (see
#    configs/config_ablation_*.yaml), which guarantees that the ONLY thing
#    differing between the full model and an ablation is the parameter under
#    test - the classic "change one thing at a time" requirement.
# =============================================================================

experiment:
  name: "baseline_full"
  seed: 42                      # Propagated to numpy, random, torch, sklearn
  description: "Full pipeline: MFCC/logMel/PWP x SVM/RF/CNN with XAI"

# -----------------------------------------------------------------------------
# PATHS - all relative to repository root
# -----------------------------------------------------------------------------
paths:
  raw_dir: "data/raw/physionet2016"
  interim_dir: "data/interim"
  processed_dir: "data/processed"
  models_dir: "models"
  results_dir: "results"
  figures_dir: "figures"
  reports_dir: "reports"
  paper_dir: "paper"

# -----------------------------------------------------------------------------
# DATASET
# -----------------------------------------------------------------------------
dataset:
  name: "physionet2016"
  # PhysioNet/CinC Challenge 2016. Six training sub-databases (a..f) collected
  # at different sites with different equipment -> a natural source of domain
  # shift that we control for by stratifying splits on sub-database.
  subdatabases: ["training-a", "training-b", "training-c", "training-d", "training-e", "training-f"]
  base_url: "https://physionet.org/files/challenge-2016/1.0.0/"
  # REFERENCE.csv encodes: -1 = Normal, 1 = Abnormal.
  # We remap to 0 = Normal, 1 = Abnormal for sklearn/torch conventions.
  label_map: {"-1": 0, "1": 1}
  class_names: ["Normal", "Abnormal"]

# -----------------------------------------------------------------------------
# PREPROCESSING
# -----------------------------------------------------------------------------
preprocessing:
  target_sr: 2000               # Native rate of the PhysioNet 2016 recordings

  # Bandpass 25-400 Hz.
  # PROFESSOR Q: "Why this band?"
  # A: Below ~25 Hz the signal is dominated by respiration, body movement and
  #    DC drift. Above ~400 Hz there is essentially no cardiac acoustic energy;
  #    what is there is stethoscope/ambient noise and rubbing artefacts. The
  #    fundamental components of S1 (~25-45 Hz), S2 (~55-75 Hz) and most
  #    murmurs (up to ~400 Hz for high-frequency regurgitant murmurs) all fall
  #    inside this band. This choice follows the CinC 2016 literature.
  bandpass_low: 25.0
  bandpass_high: 400.0
  filter_order: 4
  # Zero-phase filtering (scipy.signal.filtfilt) - applies the filter forwards
  # and backwards so there is NO phase distortion. Critical here: our whole XAI
  # story is about WHEN in the cardiac cycle the model attends, so any group
  # delay introduced by a causal filter would shift the evidence in time.
  zero_phase: true

  # Spike removal (Schmidt et al. 2010): PCG recordings frequently contain
  # high-amplitude transients from friction on the stethoscope diaphragm.
  # These are not cardiac and would dominate any energy-based feature.
  spike_removal: true
  spike_window_ms: 500
  spike_threshold_factor: 3.0   # Windows whose max abs > factor * median max

  # Per-recording z-score. Removes recording-specific gain (different clinics
  # used different amplification), so the model cannot cheat by learning
  # "loud recording => site X => label Y".
  normalize: "zscore"           # one of: zscore | peak | none

# -----------------------------------------------------------------------------
# SEGMENTATION
# -----------------------------------------------------------------------------
segmentation:
  # 3 s window.
  # PROFESSOR Q: "Why 3 seconds?"
  # A: At a typical resting heart rate of 60-100 bpm one cardiac cycle lasts
  #    0.6-1.0 s. A 3 s window therefore always contains at least 3 complete
  #    cycles, so a murmur that occurs in every cycle is guaranteed to be
  #    represented, and the window is robust to the exact phase at which we
  #    happen to cut. Shorter windows (1 s) can straddle an S1-S2 boundary and
  #    contain no complete systole; we test this in ablation A6.
  segment_seconds: 3.0
  train_hop_seconds: 1.5        # 50% overlap on TRAIN -> more samples for CNN
  eval_hop_seconds: 3.0         # NO overlap on VAL/TEST -> unbiased evaluation
  # PROFESSOR Q: "Isn't overlapping segmentation a form of data leakage?"
  # A: Not across splits. Splits are frozen at RECORDING level (see below), so
  #    two overlapping segments always land in the same split. Within the
  #    training set, overlap is simply augmentation. We deliberately disable it
  #    at evaluation time so the test statistics are computed on independent
  #    windows.
  pad_policy: "drop"            # drop | zero_pad  (for trailing partial window)
  min_segments_per_recording: 1

# -----------------------------------------------------------------------------
# SPLITS
# -----------------------------------------------------------------------------
splits:
  # SUBJECT-INDEPENDENT: splitting happens on recording_id, never on segments.
  # This is the single most important guard against optimistic bias. Script 01
  # asserts disjointness and hard-fails if violated.
  level: "recording"
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  # Stratify jointly on (label, sub-database) so each split has the same class
  # balance AND the same site mix - otherwise a test set dominated by one
  # clinic would measure site transfer rather than pathology detection.
  stratify_on: ["label", "subdb"]

# -----------------------------------------------------------------------------
# FEATURES
# -----------------------------------------------------------------------------
features:
  # ---- Shared STFT front-end -------------------------------------------------
  # PROFESSOR Q: "Why n_fft=256 and only 32 mel bands? Speech uses 40-128."
  # A: Because of the sampling rate and the band of interest. At sr=2000 Hz,
  #    n_fft=256 gives a bin width of 2000/256 = 7.8 Hz. Between 25 and 400 Hz
  #    there are therefore only ~48 usable FFT bins. Asking for 64 mel filters
  #    over 48 bins produces empty (all-zero) filters, which inject structural
  #    zeros into the feature vector. 32 filters is the largest value that
  #    keeps every filter non-degenerate. This is a resolution-limited design
  #    decision, not a copy of speech defaults.
  #
  # PROFESSOR Q: "Is the mel scale even meaningful at these frequencies?"
  # A: Honestly, barely. The mel scale is approximately linear below ~1000 Hz,
  #    so a 25-400 Hz mel filterbank is very close to a linear filterbank. We
  #    keep it for comparability with the literature (Rubin et al. 2016) and we
  #    TEST this explicitly in ablation A2 (linear-frequency spectrogram). A
  #    null result there is a legitimate finding, not a failed experiment.
  n_fft: 256                    # 128 ms window at 2 kHz
  hop_length: 32                # 16 ms hop -> fine temporal grid for Grad-CAM
  window: "hann"
  fmin: 25.0
  fmax: 400.0
  n_mels: 32

  mfcc:
    n_mfcc: 13                  # Classic choice; 13 <= n_mels is required
    use_delta: true             # Velocity  - captures transient onsets (S1/S2)
    use_delta2: true            # Accel.    - captures the sharpness of onsets
    delta_width: 5
    # Temporal aggregation: MFCCs are per-frame; classical models need one
    # fixed-length vector per segment. We summarise each coefficient's
    # trajectory with 6 statistics.
    # Resulting dim = 13 * 3 (static+d+dd) * 6 stats = 234
    aggregations: ["mean", "std", "min", "max", "skew", "kurtosis"]

  logmel:
    # Kept as a 2-D (n_mels x n_frames) "image" - this is the CNN input.
    # 3 s at hop 32 -> 1 + 6000//32 = 188 frames -> input shape (32, 188).
    log_offset: 1.0e-6          # Avoid log(0)
    normalize_per_segment: false  # Normalisation stats come from TRAIN only

  pwp:
    # Perceptual Wavelet Packet features.
    # PROFESSOR Q: "Why wavelets when you already have MFCC and log-Mel?"
    # A: MFCC and log-Mel are both STFT-based and therefore assume local
    #    stationarity inside each analysis window. Heart sounds are the exact
    #    opposite: S1 and S2 are short transients with sharp onsets, and
    #    clicks/snaps are near-impulsive. The wavelet packet transform gives a
    #    multiresolution tiling of the time-frequency plane that adapts to
    #    transients, which is the textbook motivation for using it on PCG
    #    (Safara et al. 2013). This is the methodological reason the three
    #    feature domains are genuinely different and not three flavours of the
    #    same thing.
    wavelet: "db4"              # Daubechies-4: compact support, 4 vanishing
                                # moments -> good for sharp onsets
    # Level 6 -> 2^6 = 64 uniform subbands of 15.6 Hz each, ~25 of which fall
    # inside 25-400 Hz. Chosen so that the perceptual grouping below actually
    # merges several nodes per band; at level 5 there would be only ~13 nodes
    # in the band and the "grouping" would be almost one-to-one, i.e. cosmetic.
    # At 6000 samples per segment each level-6 node still holds ~94
    # coefficients, comfortably more than the db4 filter length (8), so
    # boundary effects stay negligible.
    level: 6
    # PROFESSOR Q: "How do you order the wavelet packet nodes?"
    # A: pywt returns nodes in NATURAL (Paley) order, which is NOT frequency
    #    order because of the frequency reversal in the high-pass branch at
    #    each level. We request order='freq' so node index maps monotonically
    #    to frequency. Getting this wrong silently scrambles the frequency
    #    axis - a classic and invisible bug.
    node_order: "freq"
    # Restrict to nodes overlapping the diagnostic band 25-400 Hz.
    band_low: 25.0
    band_high: 400.0
    # "Perceptual" grouping: merge the uniform WP subbands into perceptually
    # spaced bands (mel-spaced edges over the band of interest). This is what
    # makes it PERCEPTUAL wavelet packet rather than plain WP.
    perceptual_grouping: true
    n_perceptual_bands: 12
    # Best-basis selection by Shannon entropy (Coifman-Wickerhauser). Off by
    # default because a data-dependent basis complicates cross-segment
    # comparability of feature indices - which matters for SHAP.
    best_basis: false
    descriptors: ["log_energy", "rel_energy", "shannon_entropy", "std", "skew", "kurtosis", "max_abs"]

  scaling:
    method: "standard"          # StandardScaler, FIT ON TRAIN ONLY
    # PROFESSOR Q: "Where exactly do you fit the scaler?"
    # A: On the training partition only, then applied unchanged to val and
    #    test. Fitting on the full dataset would leak test-set statistics into
    #    training - a subtle but real form of leakage that inflates results.

# -----------------------------------------------------------------------------
# CLUSTERING (unsupervised analysis - course requirement)
# -----------------------------------------------------------------------------
clustering:
  k_range: [2, 3, 4, 5, 6, 7, 8]
  n_init: 10
  max_iter: 300
  # For log-Mel we must flatten the 2-D map to compare it fairly against the
  # 1-D feature sets. We optionally reduce with PCA first because raw flattened
  # log-Mel is ~6000-dim and k-means in that space is dominated by noise.
  logmel_flatten_pca_dim: 50
  pca:
    n_components_variance: 0.95   # Components retained for the variance report
    n_components_plot: 2
  tsne:
    n_components: 2
    perplexity: 30
    learning_rate: "auto"
    n_iter: 1000
    init: "pca"                 # More stable / reproducible than random init
    subsample: 3000             # t-SNE is O(N^2)-ish; subsample for tractability
  metrics: ["silhouette", "davies_bouldin", "calinski_harabasz", "ari", "nmi", "purity"]

# -----------------------------------------------------------------------------
# CLASSICAL MODELS
# -----------------------------------------------------------------------------
classical:
  # PROFESSOR Q: "Why StratifiedGroupKFold and not plain StratifiedKFold?"
  # A: Because segments from the same recording are highly correlated (same
  #    patient, same stethoscope, same murmur). If two segments of one
  #    recording land in different CV folds, the model has effectively seen
  #    the test example during training. Grouping by recording_id eliminates
  #    this. The 'Stratified' part additionally preserves class balance.
  cv_folds: 5
  cv_strategy: "stratified_group_kfold"
  scoring: "balanced_accuracy"  # == MAcc = (Se+Sp)/2, the official CinC metric
  n_jobs: -1

  feature_sets: ["mfcc", "pwp"]  # log-Mel goes to the CNN, not to SVM/RF

  svm:
    kernel: "rbf"
    class_weight: "balanced"    # Compensates the ~1:3 abnormal:normal ratio
    probability: true           # Needed for ROC-AUC and probability averaging
    grid:
      C: [0.1, 1.0, 10.0, 100.0]
      gamma: ["scale", 0.001, 0.01, 0.1]

  random_forest:
    class_weight: "balanced_subsample"
    n_jobs: -1
    grid:
      n_estimators: [200, 500]
      max_depth: [null, 10, 20]
      min_samples_leaf: [1, 2, 5]
      max_features: ["sqrt", 0.3]

# -----------------------------------------------------------------------------
# CNN
# -----------------------------------------------------------------------------
cnn:
  # 4 convolutional blocks on the (1, 32, 188) log-Mel "image".
  # PROFESSOR Q: "Why so small? Why not ResNet / a pretrained model?"
  # A: ~3000 recordings is a small dataset. A 25M-parameter network would
  #    memorise it. This architecture has ~0.2M parameters, which keeps the
  #    parameter:sample ratio sane. Transfer learning from ImageNet is possible
  #    but the domain gap (natural images -> 32-band PCG spectrograms) is large
  #    and it would obscure the feature-domain comparison that is the point of
  #    the study. We state this as an explicit scope boundary.
  architecture:
    conv_channels: [16, 32, 64, 128]
    kernel_size: 3
    padding: 1
    pool_size: 2
    batch_norm: true
    dropout: 0.3
    fc_hidden: 64
    n_classes: 2
    global_pool: "avg"          # Makes the head independent of input width

  training:
    epochs: 60
    batch_size: 64
    optimizer: "adam"
    learning_rate: 0.001
    weight_decay: 0.0001
    scheduler: "reduce_on_plateau"
    scheduler_patience: 5
    scheduler_factor: 0.5
    early_stopping_patience: 12
    monitor: "val_macc"         # Checkpoint on balanced accuracy, not accuracy
    # Class-weighted cross-entropy. Without it the model can reach ~78%
    # accuracy by predicting "Normal" for everything, while MAcc stays at 0.5.
    class_weighting: true
    device: "cuda"              # Local GPU; falls back to cpu automatically
    num_workers: 4
    pin_memory: true
    amp: true                   # Mixed precision - free speedup on modern GPUs

  augmentation:
    enabled: true
    time_shift: true            # Circular shift - the cycle phase is arbitrary
    time_shift_max_frac: 0.2
    gaussian_noise: true
    noise_std: 0.01
    # NOT used: SpecAugment frequency masking. Masking whole frequency bands
    # could delete the murmur itself, and would also corrupt the Grad-CAM
    # frequency analysis we depend on later.
    spec_augment: false

# -----------------------------------------------------------------------------
# EVALUATION
# -----------------------------------------------------------------------------
evaluation:
  # Headline numbers are RECORDING level. Segment-level numbers are reported
  # too, but a clinician diagnoses a patient, not a 3-second window.
  aggregation: ["majority_vote", "mean_probability"]
  primary_aggregation: "mean_probability"
  primary_metric: "macc"
  metrics: ["accuracy", "f1_macro", "precision", "recall", "sensitivity", "specificity", "macc", "roc_auc"]
  bootstrap:
    enabled: true
    n_resamples: 1000
    ci: 0.95
  mcnemar:
    enabled: true
    correction: true            # Continuity correction for small discordant counts
  # Reference numbers from the published CinC 2016 entries, reported alongside
  # ours for context. NOT a like-for-like comparison: they used the official
  # hidden test set. We say so explicitly in the paper.
  literature_reference:
    "Potes et al. 2016 (CinC winner)": {macc: 0.860, sensitivity: 0.942, specificity: 0.778}
    "Rubin et al. 2016 (CNN)": {macc: 0.839, sensitivity: 0.727, specificity: 0.951}
    "Zabihi et al. 2016 (ensemble)": {macc: 0.859, sensitivity: 0.869, specificity: 0.849}

# -----------------------------------------------------------------------------
# EXPLAINABILITY
# -----------------------------------------------------------------------------
xai:
  shap:
    # TreeExplainer is exact and fast for forests. KernelSHAP is a
    # model-agnostic approximation and is expensive (O(n_background * n_samples)),
    # so we subsample aggressively for the SVM.
    tree_models: ["rf_mfcc", "rf_pwp"]
    kernel_models: ["svm_mfcc"]
    background_size: 100
    explain_subsample: 500
    top_k_features: 20
    # Mapping cepstral coefficients back to frequency:
    # MFCCs are a DCT of the log-mel spectrum, so coefficient i is not tied to
    # one frequency. We project SHAP mass through |DCT basis| to obtain an
    # approximate per-mel-band attribution. This is an approximation and we
    # label it as such in the paper.
    map_to_frequency: true

  gradcam:
    target_layer: "conv_block_4"   # Last conv block: best trade-off between
                                   # semantic content and spatial resolution
    # PROFESSOR Q: "Why the last conv layer?"
    # A: Earlier layers have high spatial resolution but encode generic edges;
    #    the last conv layer encodes class-discriminative structure while still
    #    retaining a spatial grid (2 x 11 here), which we upsample back to the
    #    input. This is the standard Grad-CAM recommendation.
    n_examples_per_category: 4     # TP / TN / FP / FN
    normalize: "unit_mass"         # So heatmaps are comparable across examples
    upsample_mode: "bilinear"

  segmentation:
    # PROFESSOR Q: "Is this the real Springer HSMM segmenter?"
    # A: No, and we are explicit about it. The Springer 2016 segmenter is a
    #    logistic-regression HSMM released as MATLAB code. We implement a
    #    lighter envelope-based segmenter (homomorphic + Shannon energy
    #    envelope, autocorrelation for cycle length, peak picking, and the
    #    physiological systole<diastole duration rule). It is used ONLY at
    #    evaluation time to define cardiac-state windows for the XAI alignment
    #    metric - never during training - so an imperfect segmenter adds noise
    #    to the metric but cannot inflate classification results.
    method: "envelope_hsmm_lite"
    envelope: "shannon"           # shannon | homomorphic | hilbert
    smoothing_ms: 20
    min_hr_bpm: 40
    max_hr_bpm: 180
    # Physiological prior: at normal heart rates systole is shorter than
    # diastole. This is what lets us label which of the two intervals between
    # detected peaks is systole without any supervision.
    systole_fraction_prior: 0.35
    confidence_threshold: 0.5     # Segments below this are EXCLUDED and counted

  alignment:
    states: ["S1", "systole", "S2", "diastole"]
    # Null baselines for the permutation test.
    null_baselines: ["uniform", "shuffled"]
    n_permutations: 1000
    # The headline statistic: fraction of attribution mass inside systole,
    # compared against the fraction of TIME occupied by systole. A model that
    # attends uniformly scores exactly the time fraction; a model that has
    # learned murmurs should score above it.
    primary_state: "systole"

# -----------------------------------------------------------------------------
# ABLATIONS (each entry points to an override config)
# -----------------------------------------------------------------------------
ablations:
  enabled: ["A1_mfcc_only", "A2_linear_spec", "A3_no_classweight", "A4_no_delta",
            "A5_shallow_cnn", "A6_seglen_1s", "A7_wavelet_haar"]
  configs:
    A1_mfcc_only: "configs/config_ablation_mfcc_only.yaml"
    A2_linear_spec: "configs/config_ablation_linear_spec.yaml"
    A3_no_classweight: "configs/config_ablation_no_classweight.yaml"
    A4_no_delta: "configs/config_ablation_no_delta.yaml"
    A5_shallow_cnn: "configs/config_ablation_shallow_cnn.yaml"
    A6_seglen_1s: "configs/config_ablation_seglen_1s.yaml"
    A7_wavelet_haar: "configs/config_ablation_wavelet_haar.yaml"

# -----------------------------------------------------------------------------
# FIGURES
# -----------------------------------------------------------------------------
figures:
  dpi: 300
  formats: ["png", "pdf"]
  # IEEE two-column: a single column is 3.5 in wide, a full-width figure 7.16 in.
  single_col_width: 3.5
  double_col_width: 7.16
  default_height: 2.6
  font_family: "serif"
  font_size: 8
  cmap_diverging: "RdBu_r"
  cmap_sequential: "viridis"
  class_colors: ["#2E86AB", "#D7263D"]   # Normal (blue) / Abnormal (red)
